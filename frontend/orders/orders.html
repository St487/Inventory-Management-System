<div class="orders-page">
    <div class="action-top-row">
        <h5 class="header-title-block"><span class="title">Create Customer Order</span></h5>
    </div>

    <div class="form-card order-form">
        <div class="form-grid">
            <div class="form-group">
                <label>Customer</label>
                <select id="customer_id"></select>
            </div>
            <div class="form-group">
                <label>Product</label>
                <select id="product_id" onchange="previewOrder()"></select>
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" min="1" value="1" oninput="previewOrder()">
            </div>
            <div class="form-group">
                <label>Payment Status</label>
                <select id="payment_status">
                    <option>Paid</option>
                    <option>Unpaid</option>
                </select>
            </div>
        </div>
        <div class="calculation-box" id="calculationBox"></div>
        <div class="form-actions">
            <button type="button" class="btn-save" onclick="createOrder()"><i class="fa fa-save"></i> Create Order</button>
        </div>
    </div>

    <div class="header-action-row">
        <div class="search-and-create-bar">
            <div class="search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input type="text" id="searchInput" onkeyup="loadOrders()" placeholder="Search order, customer, product...">
            </div>
            <button class="btn-secondary" onclick="clearOrderSearch()">Clear</button>
        </div>
    </div>

    <div class="table-card">
        <table class="modern-data-table">
            <thead>
                <tr>
                    <th>Order No</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>
    </div>
</div>
