<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('products/products.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-box"></i> Add New Product</h2>
            <p>Fill in the details below to create a new product</p>
        </div>
    </div>

    <div class="form-card">
        <form id="productForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Product Code</label>
                    <input type="text" id="product_code" placeholder="e.g. P005" required>
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product_name" placeholder="e.g. Wireless Mouse" required>
                </div>
                <div class="form-group">
                    <label>Price (RM)</label>
                    <input type="number" id="price" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" min="0" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <select id="stock_id" required>
                        <option value="">Select Stock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="image_path">Thumbnail</label>
                    <input type="file" id="image_path" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-save" onclick="saveProduct()">
                    <i class="fa fa-save"></i> Save Product
                </button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>
        </form>
    </div>
</div>
