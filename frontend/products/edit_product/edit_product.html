<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('products/products.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-edit"></i> Edit Product</h2>
            <p>Update product information</p>
        </div>
    </div>

    <div class="form-card">
        <form>
            <input type="hidden" id="product_id">
            <div class="form-grid">
                <div class="form-group">
                    <label>Product Code</label>
                    <input type="text" id="product_code" required>
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product_name" required>
                </div>
                <div class="form-group">
                    <label>Price (RM)</label>
                    <input type="number" id="price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" min="0" required>
                </div>
                <div class="form-group">
                    <label>Supplier</label>
                    <select id="supplier_id" required>
                        <option value="">Select Supplier</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image Path</label>
                    <input type="text" id="image_path">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-save" onclick="updateProduct()">
                    <i class="fa fa-save"></i> Update Product
                </button>
                <button type="button" class="btn-delete" onclick="deleteProduct()">
                    <i class="fa fa-trash"></i> Delete Product
                </button>
            </div>
        </form>
    </div>
</div>
