<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('stock/stock.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-warehouse"></i> Add Stock</h2>
            <p>Increase the stock quantity for an existing product.</p>
        </div>
    </div>

    <div class="form-card">
        <div class="form-grid">
            <div class="form-group">
                <label>Product</label>
                <select id="product_id" onchange="previewCurrentStock()"></select>
            </div>
            <div class="form-group">
                <label>Current Quantity</label>
                <input type="number" id="current_quantity" disabled>
            </div>
            <div class="form-group">
                <label>Add Quantity</label>
                <input type="number" id="add_quantity" min="1" value="1">
            </div>
        </div>
        <div class="form-actions">
            <button type="button" class="btn-save" onclick="saveStock()"><i class="fa fa-save"></i> Save Stock</button>
        </div>
    </div>
</div>
