<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('stock/stock.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>

        <div class="page-header">
            <h2><i class="fa fa-edit"></i> Edit Stock</h2>
            <p>Update stock information.</p>
        </div>
    </div>

    <div class="form-card">
        <input type="hidden" id="stock_id">

        <div class="form-grid">

            <div class="form-group">
                <label>Stock Code</label>
                <input type="text" id="stock_code">
            </div>

            <div class="form-group">
                <label>Stock Name</label>
                <input type="text" id="name">
            </div>

            <div class="form-group">
                <label>Price (RM)</label>
                <input type="number" id="price" min="0" step="0.01">
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" min="0">
            </div>

            <div class="form-group">
                <label>Supplier</label>
                <select id="supplier_id"></select>
            </div>

            <div class="form-group">
                <label>Status Preview</label>
                <input type="text" id="status_preview" disabled>
            </div>

        </div>

        <div class="image-upload-wrapper">
            <img id="thumbnail_preview" src="" />

            <input type="file" id="image_path" accept="image/*">
        </div>

        <div class="form-actions">
            <button type="button" class="btn-save" onclick="updateStock()">
                <i class="fa fa-save"></i> Update Stock
            </button>
        </div>
    </div>
</div>
