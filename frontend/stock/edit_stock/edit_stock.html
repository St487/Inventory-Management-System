<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('stock/stock.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-edit"></i> Edit Stock</h2>
            <p>Update the available quantity for this product.</p>
        </div>
    </div>

    <div class="form-card">
        <input type="hidden" id="product_id">
        <div class="form-grid">
            <div class="form-group">
                <label>Product Code</label>
                <input type="text" id="product_code" disabled>
            </div>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" disabled>
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" min="0">
            </div>
            <div class="form-group">
                <label>Status Preview</label>
                <input type="text" id="status_preview" disabled>
            </div>
        </div>
        <div class="form-actions">
            <button type="button" class="btn-save" onclick="updateStock()"><i class="fa fa-save"></i> Update Stock</button>
        </div>
    </div>
</div>
