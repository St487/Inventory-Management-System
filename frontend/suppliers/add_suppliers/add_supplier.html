<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Supplier</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="page-container">

    <div class="header-row">

        <a href="#" class="btn-back" onclick="loadPage('suppliers/suppliers.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>

        <div class="page-header">
            <h2><i class="fa fa-truck"></i> Add New Supplier</h2>
            <p>Fill in the details below to create a new supplier</p>
        </div>

    </div>

    <div class="form-card">

        <form id="supplierForm">

            <div class="form-grid">

                <div class="form-group">
                    <label>Supplier Name</label>
                    <input type="text" id="supplierName" placeholder="Enter supplier name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="supplierEmail" placeholder="supplier@email.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="supplierPhone" placeholder="0123456789">
                </div>

                <div class="form-group">
                    <label>Logo</label>
                    <input type="file" id="supplierLogo" accept="image/*">
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea id="supplierAddress" rows="4" placeholder="Enter supplier address"></textarea>
                </div>

            </div>

            <div class="form-actions">

                <button type="button" class="btn-save" onclick="saveSupplier()">
                    <i class="fa fa-save"></i> Save Supplier
                </button>

                <button type="reset" class="btn-reset">
                    Reset
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
