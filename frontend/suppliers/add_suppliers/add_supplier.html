<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('suppliers/suppliers.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-truck"></i> Add Supplier</h2>
            <p>Create supplier details used by products and stock.</p>
        </div>
    </div>

    <div class="form-card">
        <div class="form-grid">
            <div class="form-group">
                <label>Supplier Code</label>
                <input type="text" id="supplier_code" placeholder="S004" required>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" required>
            </div>
            <div class="form-group">
                <label>Logo Path</label>
                <input type="text" id="logo_path" placeholder="assets/logos/supplier.png">
            </div>
            <div class="form-group full-width">
                <label>Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="button" class="btn-save" onclick="saveSupplier()"><i class="fa fa-save"></i> Save Supplier</button>
            <button type="reset" class="btn-reset">Reset</button>
        </div>
    </div>
</div>
