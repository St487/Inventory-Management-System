<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('suppliers/suppliers.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>

        <div class="page-header">
            <h2><i class="fa fa-truck"></i> Add Supplier</h2>
            <p>Create supplier details used by products and stock.</p>
        </div>
    </div>

    <div class="form-card">
        <div class="form-grid">

            <div class="form-group">
                <label for="supplier_code">Supplier Code <span class="required">*</span></label>
                <input type="text" id="supplier_code" placeholder="Example: S004" required>
            </div>

            <div class="form-group">
                <label for="name">Supplier Name <span class="required">*</span></label>
                <input type="text" id="name" placeholder="Example: Intel Sdn Bhd" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" placeholder="Example: supplier@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input type="tel" id="phone" placeholder="Example: 0123456789" required>
            </div>

            <div class="form-group full-width">
                <label for="logo_path">Supplier Logo</label>
                <input type="file" id="logo_path" accept="image/png, image/jpeg, image/jpg, image/webp">
            </div>

            <div class="form-group full-width">
                <label for="address">Address <span class="required">*</span></label>
                <textarea id="address" rows="3" placeholder="Example: No. 12, Jalan Industri 3, 31350 Ipoh, Perak" required></textarea>
            </div>

        </div>

        <div class="form-actions">
            <button type="button" class="btn-save" onclick="saveSupplier()">
                <i class="fa fa-save"></i> Save Supplier
            </button>

            <button type="reset" class="btn-reset" onclick="resetLogoPreview()">
                Reset
            </button>
        </div>
    </div>
</div>
