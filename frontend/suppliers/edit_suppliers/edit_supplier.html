<div class="page-container">
    <div class="header-row">
        <a href="#" class="btn-back" onclick="loadPage('suppliers/suppliers.html'); return false;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
        <div class="page-header">
            <h2><i class="fa fa-edit"></i> Edit Supplier</h2>
            <p>Update supplier details.</p>
        </div>
    </div>

    <div class="form-card">
        <input type="hidden" id="supplier_id">
        <div class="form-grid">
            <div class="form-group">
                <label>Supplier Code</label>
                <input type="text" id="supplier_code" required>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" required>
            </div>
            <div class="form-group full-width">
                <label>Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>

            <div class="image-upload-wrapper">
            <label>Supplier Logo</label>

            <img
                id="thumbnail_preview"
                src="../backend/assets/product-placeholder.png"
                alt="Supplier logo preview"
                class="supplier-logo-preview"
            />

            <input
                type="file"
                id="logo_path"
                accept=".jpg,.jpeg,.png,.webp,image/*"
                onchange="previewSupplierLogo()"
            >
        </div>
        </div>
        <div class="form-actions">
            <button type="button" class="btn-save" onclick="updateSupplier()"><i class="fa fa-save"></i> Update Supplier</button>
            <button type="button" class="btn-delete" onclick="deleteSupplier()"><i class="fa fa-trash"></i> Delete Supplier</button>
        </div>
    </div>
</div>
